<style>
  .language-switcher {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10000;
    font-size: .86rem;
    color: #123a6f;
  }
  .language-switcher summary {
    list-style: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    width: 48px;
    height: 38px;
    padding: 6px 8px;
    border: 1px solid rgba(18, 58, 111, .18);
    border-radius: 999px;
    background: rgba(255, 255, 255, .94);
    box-shadow: 0 4px 16px rgba(0, 0, 0, .10);
    cursor: pointer;
    user-select: none;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .language-switcher summary::-webkit-details-marker { display: none; }
  .language-switcher summary:hover {
    transform: translateY(-1px);
    border-color: rgba(18, 58, 111, .32);
    box-shadow: 0 7px 22px rgba(0, 0, 0, .14);
  }
  .language-flag {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    font-size: 1.05rem;
  }
  .language-chevron {
    color: #6b7280;
    font-size: .62rem;
    transition: transform .15s ease;
  }
  .language-switcher[open] .language-chevron { transform: rotate(180deg); }
  .language-menu {
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    min-width: 58px;
    padding: 6px;
    border: 1px solid rgba(18, 58, 111, .16);
    border-radius: 14px;
    background: rgba(255, 255, 255, .98);
    box-shadow: 0 10px 28px rgba(0, 0, 0, .16);
  }
  .language-option {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 38px;
    padding: 6px;
    border: 0;
    border-radius: 12px;
    background: transparent;
    color: #123a6f;
    font: inherit;
    font-weight: 700;
    text-align: left;
    cursor: pointer;
  }
  .language-option:hover { background: #eef3ff; }
  .language-option.is-active {
    background: #e6f2ff;
    color: #0d2b52;
  }
  .language-option .language-check {
    position: absolute;
    right: 6px;
    bottom: 4px;
    color: #cc0669;
    font-weight: 900;
    font-size: .7rem;
    line-height: 1;
  }
  @media (max-width: 560px) {
    .language-switcher { top: 8px; }
  }
</style>

<details class="language-switcher" id="languageSwitcher">
  <summary aria-label="{{ t('Language') }}">
    <span class="language-flag" aria-hidden="true">{% if current_lang == "it" %}🇮🇹{% else %}🇬🇧{% endif %}</span>
    <span class="language-chevron" aria-hidden="true">▾</span>
  </summary>
  <form class="language-menu" method="get" action="{{ request.path }}">
    <button class="language-option {% if current_lang == 'en' %}is-active{% endif %}" type="button" name="lang" value="en" aria-label="English">
      <span class="language-flag" aria-hidden="true">🇬🇧</span>
      {% if current_lang == "en" %}<span class="language-check" aria-hidden="true">✓</span>{% endif %}
    </button>
    <button class="language-option {% if current_lang == 'it' %}is-active{% endif %}" type="button" name="lang" value="it" aria-label="Italiano">
      <span class="language-flag" aria-hidden="true">🇮🇹</span>
      {% if current_lang == "it" %}<span class="language-check" aria-hidden="true">✓</span>{% endif %}
    </button>
  </form>
</details>

<script>
  window.Q2Q_I18N = {
    lang: {{ current_lang|tojson }},
    translations: {{ ui_translations.get(current_lang, {})|tojson }}
  };
  window.q2qT = function(text) {
    const dict = (window.Q2Q_I18N && window.Q2Q_I18N.translations) || {};
    const key = String(text || "").replace(/\s+/g, " ").trim();
    return dict[key] || text;
  };

  (function(){
    const languageForm = document.querySelector("#languageSwitcher .language-menu");
    if (languageForm) {
      function setHidden(form, name, value) {
        let hidden = form.querySelector('input[type="hidden"][name="' + name + '"]');
        if (!hidden) {
          hidden = document.createElement("input");
          hidden.type = "hidden";
          hidden.name = name;
          form.appendChild(hidden);
        }
        hidden.value = value;
      }

      function changeLanguage(lang) {
        if (!lang) return;
        const sourceForm = document.getElementById("mainForm");
        if (!sourceForm) {
          const url = new URL(window.location.href);
          url.searchParams.set("lang", lang);
          window.location.href = url.toString();
          return;
        }

        setHidden(sourceForm, "lang", lang);
        sourceForm.querySelectorAll('input[type="hidden"][name="action"]').forEach(function(actionInput) {
          actionInput.value = "";
        });

        const submitEvent = new Event("submit", { bubbles: true, cancelable: true });
        if (!sourceForm.dispatchEvent(submitEvent)) return;
        sourceForm.submit();
      }

      languageForm.querySelectorAll('button[name="lang"]').forEach(function(button) {
        button.addEventListener("click", function(event) {
          event.preventDefault();
          changeLanguage(button.value || "");
        });
      });

      languageForm.addEventListener("submit", function(event) {
        event.preventDefault();
        const submitter = event.submitter || document.activeElement;
        if (submitter && submitter.name === "lang") {
          changeLanguage(submitter.value || "");
        }
      });
    }

    const cfg = window.Q2Q_I18N || {};
    const dict = cfg.translations || {};
    const skipTags = new Set(["SCRIPT", "STYLE", "TEXTAREA", "PRE", "CODE", "SVG"]);

    function translateText(value) {
      const key = String(value || "").replace(/\s+/g, " ").trim();
      return dict[key] || null;
    }

    function translateNode(node) {
      if (!node || skipTags.has(node.nodeName)) return;
      const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
      if (element && element.closest("#tutorMessages")) return;
      if (node.nodeType === Node.TEXT_NODE) {
        const translated = translateText(node.nodeValue);
        if (translated) {
          const leading = (node.nodeValue.match(/^\s*/) || [""])[0];
          const trailing = (node.nodeValue.match(/\s*$/) || [""])[0];
          node.nodeValue = leading + translated + trailing;
        }
        return;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return;

      ["title", "placeholder", "aria-label"].forEach((attr) => {
        if (!node.hasAttribute(attr)) return;
        const translated = translateText(node.getAttribute(attr));
        if (translated) node.setAttribute(attr, translated);
      });

      if (node.dataset && node.dataset.i18n) {
        const translated = dict[node.dataset.i18n] || translateText(node.textContent);
        if (translated) node.textContent = translated;
      }

      Array.from(node.childNodes).forEach(translateNode);
    }

    document.addEventListener("DOMContentLoaded", function(){
      document.documentElement.lang = cfg.lang || "en";
      translateNode(document.body);
      const switcher = document.getElementById("languageSwitcher");
      document.addEventListener("click", function(event) {
        if (switcher && switcher.open && !switcher.contains(event.target)) {
          switcher.open = false;
        }
      });
      const observer = new MutationObserver(function(mutations){
        mutations.forEach(function(mutation){
          mutation.addedNodes.forEach(translateNode);
        });
      });
      observer.observe(document.body, { childList: true, subtree: true });
      window.q2qTranslateNode = translateNode;
      setTimeout(function(){ translateNode(document.body); }, 100);
      setTimeout(function(){ translateNode(document.body); }, 500);
      window.addEventListener("load", function(){ translateNode(document.body); });
    });
  })();
</script>
